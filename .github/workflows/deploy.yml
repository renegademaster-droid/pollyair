name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: '24'

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Verify secret is set
        run: |
          if [ -z "$VITE_PUSH_SERVER_URL" ]; then
            echo "❌ VITE_PUSH_SERVER_URL ON TYHJÄ"
            exit 1
          else
            echo "✅ VITE_PUSH_SERVER_URL on asetettu (pituus: ${#VITE_PUSH_SERVER_URL})"
          fi
        env:
          VITE_PUSH_SERVER_URL: ${{ secrets.VITE_PUSH_SERVER_URL }}

      - run: npm run build
        env:
          VITE_PUSH_SERVER_URL: ${{ secrets.VITE_PUSH_SERVER_URL }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
